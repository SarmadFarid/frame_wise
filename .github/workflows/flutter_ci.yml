name: Flutter CI Optimized

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "bugfix/**"

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Check Formatting
        run: dart format . || true

      - name: Static Analysis
        run: flutter analyze || true

      - name: Run Tests
        run: flutter test || true


  android-build:
    name: Android Build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Split APKs
        run: |
          flutter build apk --release --split-per-abi
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk app-latest.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/*.apk

      - name: Upload APK to Google Drive
        uses: c-hive/gha-upload-google-drive@v1
        with:
          credentials_json: ${{ secrets.GDRIVE_CREDENTIALS }}
          folder_id: ${{ secrets.GDRIVE_FOLDER_ID }}
          source: app-latest.apk


  ios-build:
    name: iOS Build
    needs: test
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS IPA (No Code Signing)
        run: flutter build ipa --release --no-codesign

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/ipa/*.ipa