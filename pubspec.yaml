name: frame_wise
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
 
version: 1.0.0+1

environment:
  sdk: ^3.9.2
 
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
   # Core UI & State
  get: ^4.7.2
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  carousel_slider: ^5.1.2
  
  # # Media & Processing (Framewise Essentials)
  ffmpeg_kit_flutter_new: ^4.1.0
  video_player: ^2.9.2
  video_thumbnail: ^0.5.6
  path_provider: ^2.1.5
  
  # # Data & Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  shared_preferences: ^2.5.0
  get_storage: ^2.1.1
  
  # # Utilities
  http: ^1.3.0
  intl: ^0.20.2
  logger: ^2.5.0
  timezone: ^0.10.0
  flutter_timezone: ^5.0.1
  permission_handler: ^11.4.0
  file_picker: ^10.3.10

 
    
dev_dependencies:
  flutter_test:
    sdk: flutter
 
  flutter_lints: ^5.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
  - family: DMSans
    fonts:
      - asset: assets/fonts/DMSans-Light.ttf
        weight: 300
      - asset: assets/fonts/DMSans-Regular.ttf
        weight: 400
      - asset: assets/fonts/DMSans-Medium.ttf
        weight: 500
      - asset: assets/fonts/DMSans-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/DMSans-Bold.ttf
        weight: 700

  - family: Inter
    fonts:
      - asset: assets/fonts/Inter-Light.otf
        weight: 300
      - asset: assets/fonts/Inter-Regular.otf
        weight: 400
      - asset: assets/fonts/Inter-Medium.otf
        weight: 500
      - asset: assets/fonts/Inter-SemiBold.otf
        weight: 600
      - asset: assets/fonts/Inter-Bold.otf
        weight: 700

  - family: Roboto
    fonts:
     - asset: assets/fonts/Roboto-Regular.ttf
       weight: 400
     - asset: assets/fonts/Roboto-Medium.ttf
       weight: 500
